openapi: 3.1.0
info:
  title: Subscription Server API
  version: 1.0.0
  description: >-
    API contract for the current main backend server. Admin and reseller users use Google OAuth,
    users/config live in local JSON on the backend server, and code issuance/redemption records live in Cloudflare D1.
servers:
  - url: https://subscription.example.com
security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Pricing
  - name: Client
  - name: Codes
  - name: Admin

paths:
  /v1/auth/google/callback:
    post:
      tags: [Auth]
      summary: Exchange Google OIDC credential for app session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new access token
      responses:
        '200':
          description: Refreshed tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'

  /v1/me:
    get:
      tags: [Auth]
      summary: Get current user profile and roles
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'

  /v1/pricing/quote:
    post:
      tags: [Pricing]
      summary: Return effective country price quote for duration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [duration_code]
              properties:
                duration_code:
                  type: string
                  enum: [6_months, 12_months]
      responses:
        '200':
          description: Price quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'

  /v1/client/subscription/quote:
    post:
      tags: [Client]
      summary: Return 12-month direct-subscribe quote for the client app
      security: []
      responses:
        '200':
          description: Direct subscribe quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'

  /v1/client/subscription/direct:
    post:
      tags: [Client]
      summary: Complete direct subscribe after payment success
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_payment_id]
              properties:
                external_payment_id:
                  type: string
                payment_method:
                  type: string
                  enum: [qris, card]
                currency:
                  type: string
                amount_minor:
                  type: integer
      responses:
        '201':
          description: Direct subscribe completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectSubscribeResponse'

  /v1/client/subscription/redeem:
    post:
      tags: [Client]
      summary: Redeem reseller or gift-card code from the client app
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code_value]
              properties:
                code_value:
                  type: string
      responses:
        '200':
          description: Code redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedeemCodeResponse'

  /v1/codes/issue:
    post:
      tags: [Codes]
      summary: Issue code after successful payment reference confirmation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_payment_id, duration_code]
              properties:
                external_payment_id:
                  type: string
                duration_code:
                  type: string
                  enum: [6_months, 12_months]
                source:
                  type: string
                  enum: [direct, reseller, gift_card]
      responses:
        '201':
          description: Code issued/redeemed depending on flow type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueCodeResponse'

  /v1/codes/redeem:
    post:
      tags: [Codes]
      summary: Redeem a one-time code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code_value]
              properties:
                code_value:
                  type: string
      responses:
        '200':
          description: Code redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedeemCodeResponse'
        '409':
          description: Invalid state (already redeemed/expired)

  /v1/admin/users/{userId}:
    put:
      tags: [Admin]
      summary: Update role/status for a user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [admin, reseller]
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: User updated

  /v1/admin/code-batches:
    post:
      tags: [Admin]
      summary: Create bulk printed-card code batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity, duration_code, expiry_policy]
              properties:
                quantity:
                  type: integer
                  minimum: 1
                duration_code:
                  type: string
                  enum: [6_months, 12_months]
                expiry_policy:
                  type: string
                  enum: [fixed_12_months]
                  default: fixed_12_months
                notes:
                  type: string
      responses:
        '201':
          description: Batch created

  /v1/admin/backup:
    post:
      tags: [Admin]
      summary: Manually flush queued local rows into the backup batch archive
      responses:
        '200':
          description: Backup completed or queue empty

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthSessionResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/User'

    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [admin, reseller]

    QuoteResponse:
      type: object
      properties:
        country_code:
          type: string
          nullable: true
        used_fallback:
          type: boolean
        duration_code:
          type: string
        currency:
          type: string
        amount_minor:
          type: integer
        audience:
          type: string
        adjustment:
          nullable: true

    DirectSubscribeResponse:
      type: object
      properties:
        ok:
          type: boolean
        subscription_token:
          type: string
        subscribed_until:
          type: string
          format: date-time
        code_value:
          type: string
        duration_code:
          type: string
        redeemed_at:
          type: string
          format: date-time

    CreatePaymentIntentRequest:
      type: object
      required: [flow_type, duration_code, payment_method]
      properties:
        flow_type:
          type: string
          enum: [direct_subscribe, reseller_code, bulk_printed_card]
        duration_code:
          type: string
          enum: [6_months, 12_months]
        payment_method:
          type: string
          enum: [qris, card]

    PaymentIntentResponse:
      type: object
      properties:
        id:
          type: string
        order_id:
          type: string
        provider:
          type: string
        method:
          type: string
        status:
          type: string
          enum: [created, pending, paid, failed, expired, canceled]
        amount_minor:
          type: integer
        currency:
          type: string
        provider_payload:
          type: object
          additionalProperties: true

    IssueCodeResponse:
      type: object
      properties:
        code_id:
          type: string
        code_value:
          type: string
        status:
          type: string
          enum: [issued, redeemed]
        redeem_expires_at:
          type: string
          nullable: true

    RedeemCodeResponse:
      type: object
      properties:
        code_id:
          type: string
        status:
          type: string
          enum: [redeemed]
        redeemed_at:
          type: string

