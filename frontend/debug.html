<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subscription Debug Login</title>
  <style>
    :root {
      --bg: #f6f1e7;
      --panel: #fffaf2;
      --ink: #172126;
      --muted: #627178;
      --line: rgba(23, 33, 38, 0.12);
      --accent: #1f7f5c;
      --accent-dark: #176348;
      --shadow: 0 20px 48px rgba(59, 40, 18, 0.12);
      --radius: 24px;
      --font: "Segoe UI", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      background:
        radial-gradient(circle at top right, rgba(31, 127, 92, 0.16), transparent 26%),
        linear-gradient(180deg, #faf6ee 0%, #eee3d2 100%);
      color: var(--ink);
      font-family: var(--font);
    }
    .shell {
      width: min(460px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-dark);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 9vw, 42px);
      line-height: 0.96;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .stack {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 14px;
    }
    .remember input {
      width: 18px;
      height: 18px;
      margin: 0;
    }
    input, button, pre {
      font: inherit;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fffef9;
      color: var(--ink);
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      cursor: pointer;
    }
    .primary {
      background: linear-gradient(135deg, var(--accent), #2d9a71);
      color: #fff;
    }
    .secondary {
      background: #fffef9;
      border: 1px solid var(--line);
      color: var(--ink);
    }
    .status {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fffef9;
      color: var(--muted);
      font-size: 14px;
    }
    .status.ok { color: var(--accent-dark); }
    .status.error { color: #b24c39; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <p class="eyebrow">Subscription Access</p>
    <h1>Debug login and session routing</h1>
    <p>This page is preserved for operational debugging. Production entry is now served from the root path.</p>

    <section class="stack">
      <label>API Base
        <input id="apiBase" value="https://subscription-live.applocator.workers.dev">
      </label>
      <label class="remember"><input id="rememberMe" type="checkbox" checked> Stay logged in on this device</label>
      <button class="primary" id="loginBtn">Sign In with Google</button>
      <button class="secondary" id="meBtn">Check Current Session</button>
      <div class="status" id="status">Ready.</div>
      <pre id="out"></pre>
    </section>
  </main>

  <script>
    const storage = {
      access: "admin_access_token",
      refresh: "admin_refresh_token",
      remember: "admin_remember_me",
    };

    const $ = (id) => document.getElementById(id);

    $("loginBtn").onclick = login;
    $("meBtn").onclick = checkSession;

    hydrateRememberPreference();
    consumeOauthResult();

    function base() {
      return $("apiBase").value.replace(/\/$/, "");
    }

    function setStatus(message, tone) {
      $("status").textContent = message;
      $("status").className = "status" + (tone ? " " + tone : "");
    }

    async function api(path, method = "GET", body) {
      const accessToken = getToken(storage.access);
      const response = await fetch(base() + path, {
        method,
        headers: {
          "content-type": "application/json",
          ...(accessToken ? { authorization: "Bearer " + accessToken } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      const text = await response.text();
      let data = text;
      try { data = JSON.parse(text); } catch (error) {}
      if (!response.ok) throw new Error(typeof data === "string" ? data : JSON.stringify(data));
      return data;
    }

    function login() {
      persistRememberPreference();
      const redirectUrl = window.location.href.split("#")[0];
      window.location.href = `${base()}/v1/auth/google/start?redirect_url=${encodeURIComponent(redirectUrl)}`;
    }

    async function checkSession() {
      try {
        const data = await api("/v1/me");
        $("out").textContent = JSON.stringify(data, null, 2);
        routeByRole(data.user);
      } catch (error) {
        setStatus("Session check failed: " + error.message, "error");
      }
    }

    function consumeOauthResult() {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash) return;
      const params = new URLSearchParams(hash);
      const accessToken = params.get("access_token");
      const refreshToken = params.get("refresh_token");
      const userRaw = params.get("user");
      const error = params.get("error");
      if (error) {
        setStatus("Google OAuth failed: " + error, "error");
        history.replaceState(null, "", window.location.pathname + window.location.search);
        return;
      }
      if (!accessToken || !refreshToken) return;
      setTokenPair(accessToken, refreshToken);
      try {
        const user = JSON.parse(userRaw || "{}");
        $("out").textContent = JSON.stringify({ user }, null, 2);
        setStatus("Login successful. Routing now.", "ok");
        history.replaceState(null, "", window.location.pathname + window.location.search);
        routeByRole(user);
      } catch (parseError) {
        setStatus("Login succeeded but user parsing failed.", "error");
      }
    }

    function routeByRole(user) {
      const roles = Array.isArray(user && user.roles) ? user.roles : [];
      window.location.href = roles.includes("admin") ? "/admin" : "/reseller";
    }

    function hydrateRememberPreference() {
      $("rememberMe").checked = getRememberPreference();
    }

    function getRememberPreference() {
      return localStorage.getItem(storage.remember) !== "0";
    }

    function persistRememberPreference() {
      localStorage.setItem(storage.remember, $("rememberMe").checked ? "1" : "0");
    }

    function getToken(key) {
      return localStorage.getItem(key) || sessionStorage.getItem(key) || "";
    }

    function setTokenPair(accessToken, refreshToken) {
      const target = getRememberPreference() ? localStorage : sessionStorage;
      const other = target === localStorage ? sessionStorage : localStorage;
      target.setItem(storage.access, accessToken);
      target.setItem(storage.refresh, refreshToken);
      other.removeItem(storage.access);
      other.removeItem(storage.refresh);
    }
  </script>
</body>
</html>
